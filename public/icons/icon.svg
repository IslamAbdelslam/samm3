<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e2a14"/>
      <stop offset="100%" style="stop-color:#1B5E20"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d98a"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Geometric border ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(201,168,76,0.15)" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="1"/>
  <!-- Star lines (Islamic geometric) -->
  <g stroke="rgba(201,168,76,0.07)" stroke-width="1" fill="none">
    <line x1="256" y1="36" x2="256" y2="476"/>
    <line x1="36" y1="256" x2="476" y2="256"/>
    <line x1="86" y1="86" x2="426" y2="426"/>
    <line x1="426" y1="86" x2="86" y2="426"/>
  </g>
  <!-- Mic icon symbol -->
  <rect x="226" y="140" width="60" height="110" rx="30" fill="url(#gold)" opacity="0.9"/>
  <path d="M196 256 C196 296 222 328 256 336 C290 328 316 296 316 256" fill="none" stroke="url(#gold)" stroke-width="12" stroke-linecap="round"/>
  <line x1="256" y1="336" x2="256" y2="370" stroke="url(#gold)" stroke-width="12" stroke-linecap="round"/>
  <line x1="220" y1="370" x2="292" y2="370" stroke="url(#gold)" stroke-width="12" stroke-linecap="round"/>
  <!-- App name at bottom -->
  <text x="256" y="450" fill="url(#gold)" font-size="52" font-family="serif" text-anchor="middle" font-weight="bold">سَمَّعْ</text>
</svg>
